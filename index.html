<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Diagnosis Booth — RedOrbit</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0d1b2a;
  color: #fff;
  text-align: center;
}

/* Simple styling for demo */
.screen { display: none; }
.screen.active { display: block; }

button {
  padding: 12px 20px;
  margin: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>Digital Diagnosis Booth</h1>

<!-- SCREEN 1 -->
<div id="idle" class="screen active">
  <h2>Why are your competitors getting more customers?</h2>
  <p>Get a free website diagnosis in under 2 minutes</p>
  <button onclick="showForm()">Start Free Audit</button>
</div>

<!-- SCREEN 2 -->
<div id="form" class="screen">
  <h2>Enter your website details</h2>

  <input id="website" placeholder="https://yourwebsite.com"><br>
  <input id="company" placeholder="Company Name"><br>
  <input id="owner" placeholder="Your Name"><br>
  <input id="email" placeholder="Email"><br>

  <button onclick="startAudit()">Start Audit</button>
</div>

<!-- SCREEN 3 -->
<div id="loading" class="screen">
  <h2>Analyzing your website...</h2>
</div>

<!-- SCREEN 4 -->
<div id="results" class="screen">
  <h2 id="companyName"></h2>
  <p id="url"></p>

  <h3 id="score"></h3>

  <p id="performance"></p>
  <p id="seo"></p>
  <p id="accessibility"></p>
  <p id="best"></p>

  <h3>Recommendations</h3>
  <div id="recs"></div>

  <button onclick="showIdle()">New Audit</button>
</div>

<script>

function show(id){
  ["idle","form","loading","results"].forEach(s=>{
    document.getElementById(s).classList.remove("active");
  });
  document.getElementById(id).classList.add("active");
}

function showForm(){ show("form"); }
function showIdle(){ show("idle"); }

function startAudit(){
  let url = document.getElementById("website").value;

  if(!url){
    alert("Please fill all required fields");
    return;
  }

  if(!url.startsWith("http")){
    url = "https://" + url;
  }

  show("loading");

  runAudit(url);
}

function runAudit(url){

  let api = "https://www.googleapis.com/pagespeedonline/v5/runPagespeed?url=" + url;

  fetch(api)
  .then(r=>r.json())
  .then(data=>{
    let r = parseResults(data);
    r.url = url;
    showResults(r);
  })
  .catch(()=>{
    // fallback demo
    showResults({
      url: url,
      performance: 40,
      seo: 55,
      accessibility: 60,
      bestPractices: 50,
      score: 52,
      recs: buildRecs({performance:40,seo:55,accessibility:60,bestPractices:50})
    });
  });
}

function parseResults(data){
  let r = {};

  let cats = data.lighthouseResult.categories;

  r.performance = Math.round(cats.performance.score*100);
  r.seo = Math.round(cats.seo.score*100);
  r.accessibility = Math.round(cats.accessibility.score*100);
  r.bestPractices = Math.round(cats["best-practices"].score*100);

  r.score = Math.round(
    r.performance*0.35 +
    r.seo*0.30 +
    r.accessibility*0.20 +
    r.bestPractices*0.15
  );

  r.recs = buildRecs(r);

  return r;
}

function buildRecs(r){
  let recs = [];

  if(r.performance < 50)
    recs.push("🔴 Your website is very slow — users leave quickly.");
  else if(r.performance < 80)
    recs.push("🟡 Improve speed using caching and CDN.");
  else
    recs.push("✅ Performance is excellent.");

  if(r.seo < 60)
    recs.push("🔴 Your SEO is weak — competitors rank above you.");
  else if(r.seo < 80)
    recs.push("🟡 Improve SEO with better titles and keywords.");
  else
    recs.push("✅ SEO is strong.");

  if(r.accessibility < 70)
    recs.push("🔴 Improve accessibility (alt text, contrast).");

  if(r.bestPractices < 70)
    recs.push("🔴 Improve security and best practices.");

  return recs;
}

function showResults(r){
  document.getElementById("companyName").textContent = "Website Audit Result";
  document.getElementById("url").textContent = r.url;
  document.getElementById("score").textContent = "Overall Score: " + r.score + "%";

  document.getElementById("performance").textContent = "Performance: " + r.performance + "%";
  document.getElementById("seo").textContent = "SEO: " + r.seo + "%";
  document.getElementById("accessibility").textContent = "Accessibility: " + r.accessibility + "%";
  document.getElementById("best").textContent = "Best Practices: " + r.bestPractices + "%";

  document.getElementById("recs").innerHTML =
    r.recs.map(x=>"<p>"+x+"</p>").join("");

  show("results");
}

</script>

</body>
</html>
