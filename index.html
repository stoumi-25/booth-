<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Digital Diagnosis Booth</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #0d1b2a;
      color: #fff;
      margin: 0;
      padding: 50px;
    }
    h1 {
      color: #ffcc00;
    }
    h2 {
      margin-top: 20px;
    }
    p {
      font-size: 18px;
      margin: 20px 0;
    }
    .button {
      display: inline-block;
      padding: 15px 25px;
      font-size: 18px;
      color: #fff;
      background-color: #1976d2;
      text-decoration: none;
      border-radius: 5px;
      margin-top: 20px;
    }
    .button:hover {
      background-color: #0d47a1;
    }
    .qr {
      margin-top: 30px;
    }
    .qr img {
      width: 200px;
      height: 200px;
    }
  </style>
</head>
<body>
  <h1>Digital Diagnosis Booth</h1>
  <h2>Why are your competitors getting more customers?</h2>
  <p>Get a free website diagnosis in under 2 minutes</p>
  <a class="button" href="https://forms.gle/v11obKT4MQ1y6yG57" target="_blank">
    Start Free Audit
  </a>
  <div class="qr">
    <p>Or scan the QR code:</p>
    <img src="https://chart.googleapis.com/chart?chs=200x200&cht=qr&chl=https://stoumi-25.github.io/booth-/" alt="QR Code to Website">
  </div>
</body>
</html>
